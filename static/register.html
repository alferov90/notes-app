<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация — DayFlow</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <a href="/" class="logo" style="margin-bottom:24px">
      <span class="logo-icon">☀️</span>
      <span>DayFlow</span>
    </a>
    <h1>Регистрация</h1>
    <p class="auth-sub">Создайте свой режим дня</p>
    <form id="register-form">
      <label class="form-field">
        <span>Имя</span>
        <input type="text" name="name" required autocomplete="name">
      </label>
      <label class="form-field">
        <span>Email</span>
        <input type="email" name="email" required autocomplete="email">
      </label>
      <label class="form-field">
        <span>Пароль</span>
        <input type="password" name="password" required minlength="8" autocomplete="new-password">
      </label>
      <label class="form-field">
        <span>Подтвердите пароль</span>
        <input type="password" name="password_confirm" required autocomplete="new-password">
      </label>
      <p id="form-error" class="form-error"></p>
      <button type="submit" id="submit-btn" class="btn btn-primary btn-full">Создать аккаунт</button>
    </form>
    <p class="auth-footer">Есть аккаунт? <a href="/login">Войти</a></p>
  </div>
  <script src="/static/js/auth.js"></script>
  <script src="/static/js/register.js"></script>
</body>
</html>
