<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — DayFlow</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <a href="/" class="logo" style="margin-bottom:24px">
      <span class="logo-icon">☀️</span>
      <span>DayFlow</span>
    </a>
    <h1>Вход</h1>
    <p class="auth-sub">Войдите в свой режим дня</p>
    <form id="login-form">
      <label class="form-field">
        <span>Email</span>
        <input type="email" name="email" required autocomplete="email">
      </label>
      <label class="form-field">
        <span>Пароль</span>
        <input type="password" name="password" required autocomplete="current-password">
      </label>
      <p id="form-error" class="form-error"></p>
      <button type="submit" id="submit-btn" class="btn btn-primary btn-full">Войти</button>
    </form>
    <p class="auth-footer">Нет аккаунта? <a href="/register">Регистрация</a></p>
  </div>
  <script src="/static/js/auth.js"></script>
  <script src="/static/js/login.js"></script>
</body>
</html>
