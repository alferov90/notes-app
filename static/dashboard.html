<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Кабинет — DayFlow</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <nav class="nav">
    <a href="/" class="logo">
      <span class="logo-icon">☀️</span>
      <span>DayFlow</span>
    </a>
    <div class="nav-links">
      <a href="/app" class="btn btn-ghost">Мой день</a>
      <button id="btn-logout" class="btn btn-ghost">Выйти</button>
    </div>
  </nav>

  <main class="dashboard-page">
    <h1>Личный кабинет</h1>
    <p class="subtitle">Профиль и Telegram-синхронизация</p>

    <div class="dash-grid">
      <section class="dash-card">
        <div class="profile-header">
          <div class="profile-avatar" id="profile-avatar">?</div>
          <div>
            <h2 id="user-name" style="font-size:1.25rem;font-weight:600">—</h2>
            <p class="text-muted" id="user-email">—</p>
            <p class="text-muted text-sm">С нами с <span id="user-created">—</span></p>
          </div>
        </div>
      </section>

      <section class="dash-card">
        <h3>Расписание</h3>
        <div class="stats-row">
          <div>
            <div class="stat-value" id="stat-events">0</div>
            <div class="stat-label">Событий</div>
          </div>
          <div>
            <div class="stat-value" id="stat-active">0</div>
            <div class="stat-label">Активных</div>
          </div>
        </div>
        <a href="/app" class="btn btn-primary btn-full" style="margin-top:20px">Открыть расписание</a>
      </section>

      <section class="dash-card">
        <h3>Telegram</h3>
        <p class="text-muted text-sm" style="margin-bottom:14px">
          Подключите бота — он будет присылать уведомление о каждом событии режима дня.
        </p>
        <div id="telegram-status" class="telegram-status-badge">Проверка…</div>
        <div id="telegram-actions" class="telegram-actions hidden">
          <a id="telegram-link" href="#" class="btn btn-primary">Подключить Telegram</a>
          <button id="btn-telegram-refresh" class="btn btn-ghost">Обновить</button>
          <button id="btn-telegram-disconnect" class="btn btn-ghost hidden">Отключить</button>
        </div>
        <p id="telegram-error" class="form-error"></p>
        <p id="telegram-success" class="form-success"></p>
      </section>

      <section class="dash-card">
        <h3>Профиль</h3>
        <form id="profile-form">
          <label class="form-field">
            <span>Имя</span>
            <input type="text" id="form-name" required>
          </label>
          <label class="form-field">
            <span>Новый пароль</span>
            <input type="password" id="form-password" placeholder="Оставьте пустым">
          </label>
          <p id="profile-error" class="form-error"></p>
          <p id="profile-success" class="form-success"></p>
          <button type="submit" class="btn btn-primary">Сохранить</button>
        </form>
      </section>
    </div>
  </main>

  <script src="/static/js/auth.js"></script>
  <script src="/static/js/dashboard.js?v=3"></script>
</body>
</html>
